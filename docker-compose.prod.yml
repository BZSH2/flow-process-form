services:
  app:
    image: ${DEPLOY_IMAGE:?DEPLOY_IMAGE is required}
    container_name: ${CONTAINER_NAME:-flow-process-form}
    restart: unless-stopped
    ports:
      - '${HOST_PORT:-25002}:80'
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null "http://127.0.0.1/healthz" || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
